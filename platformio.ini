; Abarth 595 Dashboard - PlatformIO project
;
; Target: GUITION JC1060P470C-I-W-Y (ESP32-P4 + ESP32-C6-MINI-1U)
; Display 7" 1024x600 MIPI-DSI (JD9365) + touch GT911
;
; --- IMPORTANTE --------------------------------------------------------------
; Al momento la libreria ESP32_Display_Panel NON include un preset ufficiale
; per la board Guition JC1060P470C. Usiamo per default il preset della
; ESP32-P4-Function-EV-Board (hardware molto simile) in modo che il progetto
; compili "out of the box". Per il Guition serve poi abilitare la config
; custom (`BOARD_CUSTOM`) con i pin effettivi del JC1060P470C -- vedi README
; sezione "Adattamento al display Guition".
; ----------------------------------------------------------------------------

[platformio]
; La board reale e' il Guition JC1060P470C-I-W-Y: usiamo per default l'env
; con la config custom (pin mappati dallo schematico V1.0). L'env
; "abarth-p4-funcboard" resta disponibile come fallback sulla Function-EV-Board
; di Espressif (utile solo per bring-up generico).
default_envs = abarth-p4-guition-custom
description  = Dashboard Abarth 595 su display Guition ESP32-P4

[env]
framework            = arduino
; La versione ufficiale di `espressif32` non supporta ancora Arduino-ESP32 3.x
; (che include il core ESP32-P4). Usiamo il fork pioarduino.
platform             = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages    =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32.git#3.1.1
    platformio/framework-arduinoespressif32-libs@https://dl.espressif.com/AE/esp-arduino-libs/esp32-3.1.1-h.zip

monitor_speed        = 115200
upload_speed         = 921600

; Libreria display + LVGL v8 (la porta v9 non e' fornita ufficialmente).
lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0
    https://github.com/h2zero/NimBLE-Arduino.git#2.2.3

lib_ldf_mode         = deep+

; ESP32-P4 variants disponibili: dio_qspi, qio_qspi
board_build.arduino.memory_type = qio_qspi

[common]
build_flags =
    ; CORE_DEBUG_LEVEL=3 (INFO) per mostrare i log DIAG/BEAT nella USB Serial
    ; JTAG.  LV_LOG_LEVEL=ERROR in lv_conf.h previene il flood di glyph not
    ; found (il vero problema in precedenza era proprio LVGL, non CORE_LOG).
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src
    -I src/display
    ; NimBLE-Arduino: usa il controller BLE gia' configurato dall'IDF (su
    ; ESP32-P4 il BT e' fornito dal co-processor ESP32-C6 via esp_hosted).
    -DCONFIG_NIMBLE_CPP_IDF=1
    -DCONFIG_BT_NIMBLE_ENABLED=1

[mipi_lcd]
build_flags =
    -DLV_COLOR_16_SWAP=0

; ===========================================================================
; Env di default: usa il preset Function-EV-Board (stesso SoC + MIPI-DSI del
; Guition). Il firmware compila e parte, ma sul Guition reale serve passare
; all'env `abarth-p4-guition-custom` e compilare i pin.
; ===========================================================================
[env:abarth-p4-funcboard]
board       = BOARD_ESPRESSIF_ESP32_P4_FUNCTION_EV_BOARD
; Su ESP32-P4 arduino-esp32 3.1.x non include ancora i symboli NimBLE host
; (il BT passa via esp_hosted -> ESP32-C6). Escludiamo la libreria dal build
; e il backend BLE diventa uno stub no-op.
lib_ignore  = NimBLE-Arduino
build_flags =
    ${common.build_flags}
    ${mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_ESPRESSIF_ESP32_P4_FUNCTION_EV_BOARD
    -DABARTH_HAS_BLE=0

; ===========================================================================
; Env per il Guition JC1060P470C: board custom, i pin vanno confermati nel
; file src/esp_panel_board_custom_conf.h (impostare ESP_PANEL_BOARD_DEFAULT_USE_CUSTOM a 1).
; ===========================================================================
[env:abarth-p4-guition-custom]
board       = BOARD_CUSTOM
lib_ignore  = NimBLE-Arduino
build_flags =
    ${common.build_flags}
    ${mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_CUSTOM=1
    -DABARTH_HAS_BLE=0
    ; Isolamento HP_WDT completato in PR #11/#12/#13: il colpevole era il
    ; refresh card in on_tick (22 remove/add stile + set_text ogni 100 ms).
    ; Fix definitivo in on_tick: cache testo/stile per card, writeback
    ; LVGL solo quando cambia.  I flag ABARTH_DIAG_NO_TICK_* non servono
    ; piu' e sono stati rimossi.
